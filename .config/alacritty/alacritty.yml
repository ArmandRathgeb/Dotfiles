# Configuration for Alacritty, the GPU enhanced terminal emulator.

# Any items in the `env` entry below will be added as
# environment variables. 
env:
  TERM: alacritty

window:
  padding:
    x: 5
    y: 3

  
# Font configuration
font:
  # Normal (roman) font face
  normal:
    family: Jetbrains Mono

    style: Regular

  # Bold font face
  bold:
    family: Jetbrains Mono

    style: Bold

  # Italic font face
  italic:
    family: Jetbrains Mono

    style: Italic

  # Bold italic font face
  bold_italic:
    family: Jetbrains Mono 

    style: Bold Italic

  # Point size
  size: 16.

# Colors 
colors:
  # Default colors
  primary:
    background: '#010203'
    foreground: '#FFFFFF' #'#00008b'

  selection:
    text: '#000000'
    background: '#44475a'

  # Normal colors
  normal:
    black:   '#000000'
    red:     '#cc0403'
    green:   '#19cb00'
    yellow:  '#cecb00'
    blue:    '#0d73cc'
    magenta: '#cb1ed1'
    cyan:    '#0dcdcd'
    white:   '#dddddd' 

  # Bright colors
  bright:
    black:   '#767676'
    red:     '#f2201f'
    green:   '#23fd00'
    yellow:  '#fffd00'
    blue:    '#1a8fff'
    magenta: '#fd28ff'
    cyan:    '#14ffff'
    white:   '#ffffff' 
background_opacity: 0.95

cursor:
  # Cursor style
  style:

    shape: Block 

    blinking: Always

shell:
  program: /bin/zsh

