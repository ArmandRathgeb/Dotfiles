theme = "modern"
icons = "material-nf"

[[block]]
block = "focused_window"
max_width = 50
show_marks = "visible"

[[block]]
block = "music"
player = "spotify"
buttons = ["play","next"]
hide_when_empty  = true


[[block]]
block = "memory"
display_type = "memory"
format_mem = "RAM: {mem_used}"
format_swap = "Swap: {swap_used}"

[[block]]
block = "cpu"
interval = 1
format = "{utilization} {frequency}"

[[block]]
block = "sound"
show_volume_when_muted=true

[[block]]
block = "time"
interval = 60
format = "%a %m/%d %R"
