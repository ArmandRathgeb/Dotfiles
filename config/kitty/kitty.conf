# fonts

font_family Ubuntu Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 20


# cursor
cursor_shape beam
cursor_blink_interval 0.5
scrollback_lines 2000
detect_urls yes
open_url_with default
open_url_modifiers ctrl


# color scheme

foreground #f8f8f2
# Hex for gruvbox foreground #ebdbb2
background #282a36
# Hex for gruvbox background #1d2021
background_opacity 0.95
selection_foreground #44475a


enable_audio_bell no

window_border_width 2pt
window_margin_width 1.8
window_padding_width 1.5
